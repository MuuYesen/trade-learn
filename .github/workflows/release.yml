name: Release

on:
  workflow_dispatch:
    inputs:
      publish:
        description: "Publish artifacts to PyPI after building"
        required: true
        default: false
        type: boolean
  push:
    tags:
      - "v*"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write
  id-token: write

jobs:
  sdist:
    name: Build source distribution
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install build backend
        run: python -m pip install --upgrade build
      - name: Build sdist
        run: python -m build --sdist
      - uses: actions/upload-artifact@v4
        with:
          name: sdist
          path: dist/*.tar.gz
          if-no-files-found: error

  wheels:
    name: Build wheels on ${{ matrix.os }} (${{ matrix.cibw-archs }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            cibw-archs: auto64
            cibw-build: "cp310-* cp311-* cp312-* cp313-* cp314-*"
          - os: ubuntu-latest
            cibw-archs: aarch64
            cibw-build: "cp313-*"
          - os: macos-14
            cibw-archs: arm64
            cibw-build: "cp310-* cp311-* cp312-* cp313-* cp314-*"
          - os: windows-latest
            cibw-archs: AMD64
            cibw-build: "cp310-* cp311-* cp312-* cp313-* cp314-*"
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: docker/setup-qemu-action@v3
        if: matrix.os == 'ubuntu-latest' && matrix.cibw-archs == 'aarch64'
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install cibuildwheel
        run: python -m pip install --upgrade cibuildwheel
      - name: Build wheels
        env:
          CIBW_ARCHS: ${{ matrix.cibw-archs }}
          CIBW_BUILD: ${{ matrix.cibw-build }}
        run: python -m cibuildwheel --output-dir wheelhouse
      - uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.os }}-${{ matrix.cibw-archs }}
          path: wheelhouse/*.whl
          if-no-files-found: error

  publish:
    name: Publish to PyPI
    runs-on: ubuntu-latest
    needs:
      - sdist
      - wheels
    if: startsWith(github.ref, 'refs/tags/v') || (github.event_name == 'workflow_dispatch' && github.event.inputs.publish == 'true')
    environment: pypi
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true
      - uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist
          skip-existing: true

  github-release:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs:
      - sdist
      - wheels
      - publish
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true
      - uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
