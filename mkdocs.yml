site_name: trade-learn
site_description: Python quantitative research framework for traditional and ML strategies.
repo_url: https://github.com/MuuYesen/trade-learn
docs_dir: docs
exclude_docs: |
  PROGRESS.md
  superpowers/

theme:
  name: material
  language: zh
  features:
    - navigation.sections
    - navigation.indexes
    - navigation.top
    - content.code.copy

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          options:
            docstring_style: google
            show_source: true
            show_root_heading: true

nav:
  - Quickstart: README.md
  - Project: PROJECT.md
  - Runbook: RUNBOOK.md
  - Specs:
      - Architecture: specs/ARCHITECTURE.md
      - Contracts: specs/CONTRACTS.md
      - Backtest: specs/BACKTEST_SPEC.md
      - Strategy: specs/STRATEGY_SPEC.md
      - Migration: specs/MIGRATION.md
      - Consistency: specs/CONSISTENCY.md
      - Indicators: specs/INDICATORS_SPEC.md
      - Metrics: specs/METRICS_SPEC.md
      - Report: specs/REPORT_SPEC.md
  - Internal:
      - Event Loop: internal/event-loop.md
      - Matching: internal/matching-design.md
      - Portfolio: internal/portfolio.md
  - Release:
      - Evaluation: release/evaluation.md
      - API Reference:
          - Overview: api/reference.md
          - Strategy Writing Guide: api/strategy.md
          - Engine API Guide: api/engine.md
          - Lite API Guide: api/lite.md
          - Reference:
              - Engine: api/reference/engine.md
              - Lite: api/reference/lite.md
              - Data: api/reference/data.md
              - Indicators: api/reference/indicators.md
              - Metrics: api/reference/metrics.md
              - Factor: api/reference/factor.md
              - Report: api/reference/report.md
              - ML: api/reference/ml.md
