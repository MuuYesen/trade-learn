site_name: trade-learn
site_author: MuuYesen
site_description: Python quantitative research framework for traditional and ML strategies.
repo_url: https://github.com/MuuYesen/trade-learn
repo_name: MuuYesen/trade-learn
docs_dir: design
exclude_docs: |
  PROGRESS.md
  BACKTESTING_COMPAT.md
  backtrader_compat_refactor.md
  archive/
  superpowers/

theme:
  name: material
  custom_dir: design/mkdocs/overrides
  language: zh
  palette:
    - scheme: default
      primary: indigo
      accent: orange
      toggle:
        icon: material/weather-night
        name: 切换至夜间模式
    - scheme: slate
      primary: indigo
      accent: orange
      toggle:
        icon: material/weather-sunny
        name: 切换至日间模式
  features:
    - content.code.copy
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.top
    - navigation.footer
    - navigation.indexes
    - navigation.expand
    - search.suggest
    - search.highlight
    - search.share
  icon:
    repo: fontawesome/brands/github-alt
edit_uri: edit/main/design
copyright: Copyright &copy; 2026 trade-learn
extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/MuuYesen/trade-learn
      name: GitHub | trade-learn

extra_css:
  - mkdocs/css/unordered-list-symbols.css
  - mkdocs/css/img-center.css
  - mkdocs/css/backtrader-header.css

plugins:
  - search:
      lang:
        - en
        - ja
      separator: '[\s\-,:!=\[\]()"/]+|(?!\b)(?=[A-Z][a-z])|\.(?!\d)|&[lg]t;'
  - mkdocstrings:
      handlers:
        python:
          options:
            docstring_style: google
            show_source: false
            show_root_heading: false
            show_root_toc_entry: false
            show_root_full_path: false
            show_object_full_path: false
            show_bases: false
            show_signature_annotations: true
            separate_signature: true

markdown_extensions:
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true
  - pymdownx.highlight:
      linenums: false
      linenums_style: table
  - pymdownx.superfences
  - pymdownx.inlinehilite
  - admonition
  - pymdownx.details
  - pymdownx.caret
  - pymdownx.tilde
  - pymdownx.mark

nav:
  - Quickstart: README.md
  - Project:
      - Overview: PROJECT.md
      - Structure: PROJECT_STRUCTURE.md
      - Component Usage: COMPONENT_USAGE.md
  - Runbook: RUNBOOK.md
  - Specs:
      - Architecture: specs/ARCHITECTURE.md
      - Contracts: specs/CONTRACTS.md
      - Backtest: specs/BACKTEST_SPEC.md
      - Strategy: specs/STRATEGY_SPEC.md
      - Migration: specs/MIGRATION.md
      - Consistency: specs/CONSISTENCY.md
      - Indicators: specs/INDICATORS_SPEC.md
      - Metrics: specs/METRICS_SPEC.md
      - Report: specs/REPORT_SPEC.md
  - Internal:
      - Event Loop: internal/event-loop.md
      - Matching: internal/matching-design.md
      - Portfolio: internal/portfolio.md
      - Agent Loop: internal/agent-loop.md
  - Release:
      - Evaluation: release/evaluation.md
      - API Reference:
          - Overview: api/reference.md
          - Strategy Writing Guide: api/strategy.md
          - Engine API Guide: api/engine.md
          - Lite API Guide: api/lite.md
          - Reference:
              - Engine: api/reference/engine.md
              - Lite: api/reference/lite.md
              - Data: api/reference/data.md
              - Indicators: api/reference/indicators.md
              - Metrics: api/reference/metrics.md
              - Factor: api/reference/factor.md
              - Report: api/reference/report.md
              - ML: api/reference/ml.md
