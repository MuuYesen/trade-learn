site_name: trade-learn
site_author: MuuYesen
site_description: Python quantitative research framework for traditional and ML strategies.
repo_url: https://github.com/MuuYesen/trade-learn
repo_name: MuuYesen/trade-learn
docs_dir: docs

theme:
  name: material
  custom_dir: docs/mkdocs/overrides
  language: zh
  palette:
    - scheme: default
      primary: indigo
      accent: orange
      toggle:
        icon: material/weather-night
        name: 切换至夜间模式
    - scheme: slate
      primary: indigo
      accent: orange
      toggle:
        icon: material/weather-sunny
        name: 切换至日间模式
  features:
    - content.code.copy
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.top
    - navigation.footer
    - navigation.indexes
    - navigation.expand
    - search.suggest
    - search.highlight
    - search.share
  icon:
    repo: fontawesome/brands/github-alt
edit_uri: edit/main/docs
copyright: Copyright &copy; 2026 trade-learn
extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/MuuYesen/trade-learn
      name: GitHub | trade-learn

extra_css:
  - mkdocs/css/unordered-list-symbols.css
  - mkdocs/css/img-center.css
  - mkdocs/css/backtrader-header.css

plugins:
  - search:
      lang:
        - en
        - ja
      separator: '[\s\-,:!=\[\]()"/]+|(?!\b)(?=[A-Z][a-z])|\.(?!\d)|&[lg]t;'
  - mkdocstrings:
      handlers:
        python:
          options:
            docstring_style: google
            show_source: false
            show_root_heading: false
            show_root_toc_entry: false
            show_root_full_path: false
            show_object_full_path: false
            show_bases: false
            show_signature_annotations: true
            separate_signature: true

markdown_extensions:
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true
  - pymdownx.highlight:
      linenums: false
      linenums_style: table
  - pymdownx.superfences
  - pymdownx.inlinehilite
  - admonition
  - pymdownx.details
  - pymdownx.caret
  - pymdownx.tilde
  - pymdownx.mark

nav:
  - Quickstart:
      - Home: README.md
      - Quickstart: quickstart.md
  - Concepts:
      - 架构与边界: concepts/architecture.md
      - Runtime 与 Runner: concepts/runtime.md
      - Stats 结果对象: concepts/stats.md
  - User Guide:
      - 策略撰写: guides/strategy.md
      - Lite:
          - Lite 入门: guides/lite.md
          - Lite API 签名: guides/lite-api.md
      - Engine:
          - Engine 入门: guides/engine.md
          - Engine API 签名: guides/engine-api.md
      - Data Guide: guides/data.md
      - Indicators Guide: guides/indicators.md
      - Research Guide: guides/research.md
      - Factor Guide: guides/factor.md
      - Optimization Guide: guides/optimization.md
      - Report / Plot Guide: guides/report.md
      - MLflow / Lab / MCP: guides/mlflow-lab-mcp.md
  - Design Notes:
      - 契约与边界: internals/contracts.md
      - 事件循环: internals/event-loop.md
      - 撮合与成交: internals/matching.md
      - Portfolio 模型: internals/portfolio.md
      - 与外部库的语义一致性: internals/consistency.md
      - v1 → v2 迁移: internals/migration.md
  - Benchmarks:
      - 性能基线: benchmarks.md
      - 评估与竞品对比: release/evaluation.md
  - API Reference:
      - 概览: api/reference.md
      - Lite: api/reference/lite.md
      - Engine: api/reference/engine.md
      - Data: api/reference/data.md
      - Indicators: api/reference/indicators.md
      - Metrics: api/reference/metrics.md
      - Factor: api/reference/factor.md
      - Report: api/reference/report.md
      - ML: api/reference/ml.md
      - Research: api/reference/research.md
