site_name: trade-learn
site_author: MuuYesen
site_description: Python quantitative research framework for traditional and ML strategies.
repo_url: https://github.com/MuuYesen/trade-learn
repo_name: MuuYesen/trade-learn
docs_dir: docs

theme:
  name: material
  custom_dir: docs/mkdocs/overrides
  language: zh
  palette:
    - scheme: default
      primary: indigo
      accent: orange
      toggle:
        icon: material/weather-night
        name: 切换至夜间模式
    - scheme: slate
      primary: indigo
      accent: orange
      toggle:
        icon: material/weather-sunny
        name: 切换至日间模式
  features:
    - content.code.copy
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.top
    - navigation.footer
    - navigation.expand
    - search.suggest
    - search.highlight
    - search.share
  icon:
    repo: fontawesome/brands/github-alt
edit_uri: edit/main/docs
copyright: Copyright &copy; 2026 trade-learn
extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/MuuYesen/trade-learn
      name: GitHub | trade-learn

extra_css:
  - mkdocs/css/unordered-list-symbols.css
  - mkdocs/css/img-center.css
  - mkdocs/css/backtrader-header.css

extra_javascript:
  - https://unpkg.com/mermaid@10.9.1/dist/mermaid.min.js
  - mkdocs/js/mermaid.js

plugins:
  - search:
      lang:
        - en
        - ja
      separator: '[\s\-,:!=\[\]()"/]+|(?!\b)(?=[A-Z][a-z])|\.(?!\d)|&[lg]t;'
  - mkdocstrings:
      handlers:
        python:
          options:
            docstring_style: google
            show_source: false
            show_root_heading: false
            show_root_toc_entry: false
            show_root_full_path: false
            show_object_full_path: false
            show_bases: false
            show_signature_annotations: true
            separate_signature: true

markdown_extensions:
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true
  - pymdownx.highlight:
      linenums: false
      linenums_style: table
  - admonition
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed
  - pymdownx.emoji:
      emoji_index: !!python/name:pymdownx.emoji.gemoji
      emoji_generator: !!python/name:pymdownx.emoji.to_svg

nav:
  - 快速开始:
      - 首页: README.md
      - 快速开始: quickstart.md
  - 核心概念:
      - 架构与边界: concepts/architecture.md
      - 数据模型: concepts/data-model.md
      - 运行时: concepts/runtime.md
      - 结果对象: concepts/stats.md
  - 用户指南:
      - 策略撰写: guides/strategy.md
      - 模式对比 (Lite vs Engine):
          - Lite 入门: guides/lite.md
          - Lite API 签名: guides/lite-api.md
          - Engine 入门: guides/engine.md
          - Engine API 签名: guides/engine-api.md
      - 投研流程 (Pipeline):
          - 研究指南: guides/research.md
          - 因果推断 (Causal): guides/causal.md
          - 因子指南: guides/factor.md
          - 优化指南: guides/optimization.md
          - 报告 / 绘图指南: guides/report.md
      - 基础设施:
          - 数据指南: guides/data.md
          - 指标指南: guides/indicators.md
          - 组件调用速查: guides/component-usage.md
          - 实盘协议: guides/live.md
      - 扩展与工具:
          - MLflow / Lab / MCP: guides/mlflow-lab-mcp.md
          - 扩展组件: guides/extensions.md
  - 设计笔记:
      - 核心契约: internals/contracts.md
      - 事件循环: internals/event-loop.md
      - 撮合引擎: internals/matching.md
      - 账户总账: internals/portfolio.md
      - 一致性审计: internals/consistency.md
      - 版本迁移: internals/migration.md
  - 性能基线:
      - 性能基线: benchmarks.md
      - 竞品对比: release/evaluation.md
  - API 参考:
      - Overview: api/reference.md
      - Lite: api/reference/lite.md
      - Engine: api/reference/engine.md
      - Data: api/reference/data.md
      - Indicators: api/reference/indicators.md
      - Metrics: api/reference/metrics.md
      - Factor: api/reference/factor.md
      - Report: api/reference/report.md
      - ML: api/reference/ml.md
      - Research: api/reference/research.md
